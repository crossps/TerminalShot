name: Bug report
description: Report a reproducible TerminalShot problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem. Do not include private screenshots or secrets.
  - type: input
    id: version
    attributes:
      label: TerminalShot version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: Tell us exactly what you did and what capture mode was active.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual result
    validations:
      required: true
